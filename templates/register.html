{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card p-4 shadow">

            <h2 class="text-center mb-4">
                Citizen Registration
            </h2>

            <form method="POST" action="{{ url_for('auth.register') }}">

                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input
                        type="text"
                        name="full_name"
                        class="form-control"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input
                        type="text"
                        name="username"
                        class="form-control"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Phone</label>
                    <input
                        type="tel"
                        name="phone"
                        class="form-control"
                        maxlength="10"
                        pattern="[0-9]{10}"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Address</label>
                    <textarea
                        name="address"
                        class="form-control"
                        rows="3"
                        required></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        required>
                </div>

                <button
                    type="submit"
                    class="btn btn-success w-100">

                    Register

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
