{% extends "police/layout.html" %}

{% block police_content %}

<h2>Change Password</h2>

<div class="card shadow">

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label>Current Password</label>

<input
type="password"
name="current_password"
class="form-control"
required>

</div>

<div class="mb-3">

<label>New Password</label>

<input
type="password"
name="new_password"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Confirm Password</label>

<input
type="password"
name="confirm_password"
class="form-control"
required>

</div>

<button class="btn btn-primary">

Change Password

</button>

</form>

</div>

</div>

{% endblock %}
