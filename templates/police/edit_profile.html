{% extends "police/layout.html" %}

{% block police_content %}

<h2 class="mb-4">

Edit Profile

</h2>

<form method="POST">

    <div class="mb-3">

        <label>Full Name</label>

        <input type="text"
               name="full_name"
               class="form-control"
               value="{{ officer.full_name }}"
               required>

    </div>

    <div class="mb-3">

        <label>Phone</label>

        <input type="text"
               name="phone"
               class="form-control"
               value="{{ officer.phone }}"
               required>

    </div>

    <div class="mb-3">

        <label>Address</label>

        <textarea name="address"
                  class="form-control"
                  required>{{ officer.address }}</textarea>

    </div>

    <button class="btn btn-success">

        Save Changes

    </button>

    <a href="{{ url_for('police.profile') }}"
       class="btn btn-secondary">

        Cancel

    </a>

</form>

{% endblock %}
