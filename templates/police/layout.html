        <div class="list-group shadow">

            <a href="{{ url_for('police.dashboard') }}"
               class="list-group-item list-group-item-action">

                🏠 Dashboard

            </a>

            <a href="{{ url_for('police.pending_reports') }}"
               class="list-group-item list-group-item-action">

            </a>
