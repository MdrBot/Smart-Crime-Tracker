{% extends "police/layout.html" %}

{% block police_content %}

<h2 class="mb-4">

My Profile

</h2>

<div class="card shadow">

    <div class="card-body">

        <table class="table">

            <tr>
                <th width="200">Full Name</th>
                <td>{{ officer.full_name }}</td>
            </tr>

            <tr>
                <th>Username</th>
                <td>{{ officer.username }}</td>
            </tr>

            <tr>
                <th>Phone</th>
                <td>{{ officer.phone }}</td>
            </tr>

            <tr>
                <th>Address</th>
                <td>{{ officer.address }}</td>
            </tr>

        </table>

        <a href="{{ url_for('police.edit_profile') }}"
           class="btn btn-primary">

            Edit Profile

        </a>

        <a href="{{ url_for('police.change_password') }}"
           class="btn btn-warning">

            Change Password

        </a>

    </div>

</div>

{% endblock %}
