{% extends "police/layout.html" %}

{% block police_content %}

<div class="card shadow">

    <div class="card-header">

        <h3>Reject Report</h3>

    </div>

    <div class="card-body">

        <form method="POST">

            <label class="form-label">

                Reason for Rejection

            </label>

            <textarea
                name="reason"
                class="form-control"
                rows="4"
                required></textarea>

            <br>

            <button class="btn btn-danger">

                Reject Report

            </button>

            <a href="{{ url_for('police.report_details',
                                report_id=report_id) }}"
               class="btn btn-secondary">

                Cancel

            </a>

        </form>

    </div>

</div>

{% endblock %}
