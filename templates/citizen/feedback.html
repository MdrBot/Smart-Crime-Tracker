{% extends "citizen/layout.html" %}

{% block citizen_content %}

<h2>Feedback</h2>

<div class="card shadow">

    <div class="card-body">

        {% if feedback %}

            <h4>Your Feedback</h4>

            <div class="alert alert-success">

                {{ feedback.message }}

            </div>

            <p class="text-muted">

                Submitted on: {{ feedback.feedback_date }}

            </p>

            <a href="{{ url_for('citizen.edit_feedback') }}"
               class="btn btn-warning">

                Edit Feedback

            </a>

            <a href="{{ url_for('citizen.delete_feedback') }}"
               class="btn btn-danger"
               onclick="return confirm('Are you sure you want to delete your feedback?')">

                Delete Feedback

            </a>

        {% else %}

            <form method="POST">

                <label>Your Feedback</label>

                <textarea
                    name="message"
                    rows="6"
                    class="form-control"
                    required></textarea>

                <br>

                <button class="btn btn-success">

                    Submit Feedback

                </button>

            </form>

        {% endif %}

    </div>

</div>

{% endblock %}
