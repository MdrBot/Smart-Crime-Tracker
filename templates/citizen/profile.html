{% extends "citizen/layout.html" %}

{% block citizen_content %}

<h2 class="mb-4">

My Profile

</h2>

<div class="card shadow">

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label class="form-label">

Full Name

</label>

<input
type="text"
name="full_name"
class="form-control"
value="{{ user.full_name }}"
required>

</div>

<div class="mb-3">

<label class="form-label">

Username

</label>

<input
type="text"
class="form-control"
value="{{ user.username }}"
readonly>

</div>

<div class="mb-3">

<label class="form-label">

Phone

</label>

<input
type="text"
name="phone"
class="form-control"
value="{{ user.phone or '' }}">

</div>

<div class="mb-3">

<label class="form-label">

Address

</label>

<textarea
name="address"
class="form-control"
rows="3">{{ user.address or '' }}</textarea>

</div>

<div class="d-flex gap-2">

    <button class="btn btn-primary">
        Update Profile
    </button>

    <a href="{{ url_for('citizen.change_password') }}"
       class="btn btn-warning">

        <i class="bi bi-key-fill"></i>
        Change Password

    </a>

</div>

</form>

</div>

</div>

{% endblock %}
