{% extends "admin/layout.html" %}

{% block admin_content %}

<h2 class="mb-4">Add Police Officer</h2>

<div class="card shadow">
    <div class="card-body">

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text"
                       name="full_name"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text"
                       name="username"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password"
                       name="password"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Phone</label>
                <input type="text"
                       name="phone"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Address</label>
                <textarea name="address"
                          class="form-control"
                          rows="3"
                          required></textarea>
            </div>

            <button class="btn btn-success">
                Create Police Account
            </button>

        </form>

    </div>
</div>

{% endblock %}
